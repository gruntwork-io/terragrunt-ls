name: Release

permissions:
  contents: write

on:
  push:
    tags: ['v*']

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Package (${{ matrix.vsce_target }})
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - vsce_target: linux-x64
            goos: linux
            goarch: amd64
          - vsce_target: linux-arm64
            goos: linux
            goarch: arm64
          - vsce_target: darwin-x64
            goos: darwin
            goarch: amd64
          - vsce_target: darwin-arm64
            goos: darwin
            goarch: arm64
          - vsce_target: win32-x64
            goos: windows
            goarch: amd64
          - vsce_target: win32-arm64
            goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          version: 2025.6.8

      - name: Install npm dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.vsce_target }}
        working-directory: vscode-extension
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Upload VSIX to GitHub Release
        run: gh release upload "$GITHUB_REF_NAME" vscode-extension/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.vsce_target }}
          path: vscode-extension/*.vsix

  publish-marketplace:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          version: 2025.6.8

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --packagePath $(find . -iname '*.vsix')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
